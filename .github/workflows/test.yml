name: Build and Test Fortran Code

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
    
      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: intel
          version: '2024.1'

      - name: Build Fortran code using Makefile
        run: |
          cd src
          make clean || true
          make fortran_compiler=ifx 2>&1 | tee build.log
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Benchmark wave_small
        run: |
          cd Benchmarks/wave
          ../../src/Anura3D.out wave_small 2>&1 | tee run_wave_small.log
          ls -lh
      
      # Structure to save a file
      # - name: Upload output file
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: output-file
      #     path: Benchmarks/wave/wave_small_001.ENG

      - name: Compare Benchmark results
        run: |
          cd Benchmarks/python
          python compare_outputs.py

